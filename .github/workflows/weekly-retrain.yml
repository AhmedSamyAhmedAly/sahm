name: Weekly retrain

# The heavy job: recompute the backtest hit-rate bands and retrain the ML models
# on the FULL 16-yr history. That history is read from the GitHub Actions cache
# (a local SQLite file), so it costs ZERO Neon transfer — only the small trained
# models + bands are written to Neon. Runs Friday (EGX closed Fri/Sat).
on:
  schedule:
    - cron: "23 2 * * 5"   # Fri ~02:23 UTC
  workflow_dispatch: {}

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-engine.txt

      - name: Restore history cache
        uses: actions/cache/restore@v4
        with:
          path: backend/sahm.db
          key: sahm-db-${{ github.run_id }}
          restore-keys: sahm-db-

      - name: Backtest + retrain on local file (no Neon reads)
        env:
          DATABASE_URL: "sqlite:///./sahm.db"
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: |
          if [ ! -f sahm.db ]; then
            echo "No cached history — building it from EODHD first."
            python -m app.cli ingest
          fi
          python -m app.cli retrain

      - name: Push models + bands to Neon (small)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/push_results_to_neon.py

      - name: Save history cache
        uses: actions/cache/save@v4
        with:
          path: backend/sahm.db
          key: sahm-db-${{ github.run_id }}
