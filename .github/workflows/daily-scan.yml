name: Daily EGX scan

# LIGHT nightly job. The full 16-yr history lives in the GitHub Actions cache (a
# local SQLite file), so the engine reads it for FREE — Neon only ever takes a
# tiny incremental write (today's picks + today's bars). This is what keeps us on
# the free tier indefinitely. Runs each trading morning before the 10:00 Cairo open.
on:
  # GitHub delays/drops on-the-hour runs, so we use off-peak minutes + a backup.
  # The job is idempotent (re-scans the same date, dedupes bars). Sun-Thu, UTC.
  schedule:
    - cron: "17 1 * * 0-4"   # primary  ~01:17 UTC
    - cron: "17 5 * * 0-4"   # backup   ~05:17 UTC
  workflow_dispatch: {}      # allow manual runs (also used to first bootstrap)

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      actions: write          # manage the history cache
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-engine.txt

      # Restore the rolling history file (newest sahm-db-* entry). First ever run
      # misses -> the engine step bootstraps it from EODHD.
      - name: Restore history cache
        uses: actions/cache/restore@v4
        with:
          path: backend/sahm.db
          key: sahm-db-${{ github.run_id }}
          restore-keys: sahm-db-

      - name: Engine on local file (no Neon reads)
        id: engine
        env:
          DATABASE_URL: "sqlite:///./sahm.db"
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_TOKEN }}
          ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
        run: |
          if [ -f sahm.db ]; then
            python -m app.cli daily
          else
            echo "No cached history — bootstrapping from EODHD (one-time)."
            python -m app.cli ingest
            python -m app.cli retrain
            python -m app.cli scan
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push picks + today's bars to Neon (tiny)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/push_serving.py

      - name: Push models to Neon (only after a bootstrap)
        if: steps.engine.outputs.bootstrapped == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/push_results_to_neon.py

      - name: Save history cache
        uses: actions/cache/save@v4
        with:
          path: backend/sahm.db
          key: sahm-db-${{ github.run_id }}
