name: Daily EGX scan

# LIGHT nightly job: top-up new prices -> grade -> scan (fresh suggestions).
# No backtest/train here (that's weekly-retrain.yml) -> keeps DB transfer tiny so
# we stay on the free tier. Runs each trading morning before the 10:00 Cairo open.
on:
  # GitHub delays/drops runs scheduled on the hour (:00), so we use off-peak
  # minutes AND a later backup run. The daily job is idempotent (re-scans the
  # same date, dedupes bars), so running twice in a morning is harmless.
  # Sun-Thu only. UTC (no DST) — lands ~03:17-08:17 Cairo, before the 10:00 open.
  schedule:
    - cron: "17 1 * * 0-4"   # primary  ~01:17 UTC
    - cron: "17 5 * * 0-4"   # backup   ~05:17 UTC (catches a dropped primary)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-engine.txt
      - name: Run daily pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_TOKEN }}
          ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
        run: python -m app.cli daily
